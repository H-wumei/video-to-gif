<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频转 GIF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a; color: #e0e0e0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { width: 100%; max-width: 640px; padding: 24px; }
    h1 {
      text-align: center; font-size: 1.6rem; margin-bottom: 24px;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .drop-zone {
      border: 2px dashed #3b82f6; border-radius: 16px;
      padding: 48px 24px; text-align: center; cursor: pointer; transition: background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: rgba(59,130,246,.1); }
    .drop-zone p { font-size: .95rem; color: #94a3b8; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .file-name { font-size: .8rem; color: #6ee7b7; margin-top: 8px; text-align: center; }
    .video-preview { margin-top: 12px; display: none; text-align: center; }
    .video-preview.active { display: block; }
    .video-preview video {
      max-width: 100%; max-height: 240px; border-radius: 12px; border: 1px solid #334155;
    }
    .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .settings label { display: flex; flex-direction: column; gap: 4px; font-size: .85rem; color: #94a3b8; }
    .settings input {
      padding: 8px 10px; border-radius: 8px; border: 1px solid #334155;
      background: #1e1e2e; color: #e0e0e0; font-size: .9rem;
    }
    .full-row { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      margin-top: 16px; width: 100%; padding: 12px; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6); color: #0f0f1a;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .progress-wrap { margin-top: 16px; display: none; }
    .progress-wrap.active { display: block; }
    .progress-bar { height: 6px; border-radius: 3px; background: #1e1e2e; overflow: hidden; }
    .progress-bar .fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6ee7b7, #3b82f6); transition: width .3s;
    }
    .status { text-align: center; font-size: .8rem; color: #94a3b8; margin-top: 6px; }
    .result { margin-top: 20px; text-align: center; display: none; }
    .result.active { display: block; }
    .result img { max-width: 100%; border-radius: 12px; border: 1px solid #334155; }
    .result .info { font-size: .8rem; color: #94a3b8; margin-top: 8px; }
    .result .dl {
      display: inline-block; margin-top: 12px; padding: 10px 28px;
      border-radius: 10px; background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #0f0f1a; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎬 视频转 GIF</h1>
  <input type="file" id="fileInput" accept="video/*" hidden>
  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>拖拽视频文件到这里，或点击选择</p>
  </div>
  <div class="file-name" id="fileName"></div>
  <div class="video-preview" id="videoPreview">
    <video id="srcVideo" controls muted playsinline></video>
  </div>
  <div class="settings">
    <label>宽度 (px)<input type="number" id="optWidth" value="320" min="50" max="1920"></label>
    <label>帧率 (fps)<input type="number" id="optFps" value="10" min="1" max="30"></label>
    <div class="full-row">
      <label>开始时间 (秒)<input type="number" id="optStart" value="0" min="0" step="0.1"></label>
      <label>持续时长 (秒，0=全部)<input type="number" id="optDur" value="0" min="0" step="0.1"></label>
    </div>
    <div class="full-row">
      <label>目标大小上限 (MB)<input type="number" id="optMaxMB" value="5" min="1" max="50" step="0.5"></label>
    </div>
  </div>
  <button class="btn" id="convertBtn" disabled>开始转换</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="fill" id="bar"></div></div>
    <p class="status" id="status">准备中…</p>
  </div>
  <div class="result" id="result">
    <img id="gifOut" alt="GIF">
    <div class="info" id="gifInfo"></div>
    <a class="dl" id="dlBtn" download="output.gif">下载 GIF</a>
    <a class="dl" id="dlLottie" download="output.json" style="margin-left:8px;background:linear-gradient(135deg,#a78bfa,#6366f1);">下载 Lottie JSON</a>
  </div>
</div>

<script>
/* ============ NeuQuant 颜色量化 + GIF 编码器 ============ */
/* NeuQuant Neural-Net Quantization Algorithm */
/* Adapted from the original by Anthony Dekker, 1994 */
/* Input: RGB pixel array (r,g,b,r,g,b,...), samplefac (1-30, 1=best quality) */
class NeuQuant{
constructor(pixels,samplefac){
  this.pixels=pixels;
  this.samplefac=Math.max(1,Math.min(30,samplefac));
  const netsize=256;
  this.netsize=netsize;
  this.network=new Array(netsize);
  this.colormap=new Array(netsize);
  this.netindex=new Int32Array(256);
  this.bias=new Float64Array(netsize);
  this.freq=new Float64Array(netsize);
  this.radpower=new Float64Array(netsize>>3);
  // Initialize network with evenly spaced values
  for(let i=0;i<netsize;i++){
    const v=(i*256.0)/netsize;
    this.network[i]=[v,v,v];
    this.freq[i]=1.0/netsize;
    this.bias[i]=0;
  }
}
buildColorMap(){
  const alphadec=30+((this.samplefac-1)/3);
  const lengthcount=this.pixels.length;
  const npixels=Math.floor(lengthcount/3);
  const samplepixels=Math.floor(npixels/this.samplefac);
  const delta=Math.max(1,Math.floor(samplepixels/100));
  let alpha=1.0;
  let radius=Math.floor(this.netsize/8);
  let rad=radius;

  // Prime step
  let step;
  if(npixels<500)step=1;
  else if(npixels%499!==0)step=499;
  else if(npixels%491!==0)step=491;
  else if(npixels%487!==0)step=487;
  else step=503;

  let pix=0;
  for(let i=0;i<samplepixels;i++){
    const idx=pix*3;
    const r=this.pixels[idx],g=this.pixels[idx+1],b=this.pixels[idx+2];
    // Find best neuron
    const j=this._contest(r,g,b);
    // Update best neuron
    this._updateSingle(alpha,j,r,g,b);
    // Update neighbors
    if(rad>0)this._updateNeighbors(rad,j,r,g,b);
    pix=(pix+step)%npixels;
    if(i%delta===0&&i>0){
      alpha*=(1.0-i/(samplepixels+1.0));
      if(alpha<0.001)alpha=0.001;
      radius*=(1.0-i/(samplepixels+1.0));
      rad=Math.max(0,Math.floor(radius));
    }
  }
  // Build colormap
  for(let i=0;i<this.netsize;i++){
    this.colormap[i]=[
      Math.max(0,Math.min(255,Math.round(this.network[i][0]))),
      Math.max(0,Math.min(255,Math.round(this.network[i][1]))),
      Math.max(0,Math.min(255,Math.round(this.network[i][2])))
    ];
  }
  this._buildIndex();
}
_contest(r,g,b){
  let bestd=Infinity,bestj=0;
  let bestbiasd=Infinity,bestbiasj=0;
  for(let i=0;i<this.netsize;i++){
    const n=this.network[i];
    const dist=Math.abs(n[0]-r)+Math.abs(n[1]-g)+Math.abs(n[2]-b);
    if(dist<bestd){bestd=dist;bestj=i}
    const biasdist=dist-this.bias[i];
    if(biasdist<bestbiasd){bestbiasd=biasdist;bestbiasj=i}
    this.freq[i]*=0.99;
    this.bias[i]+=this.freq[i];
  }
  this.freq[bestj]+=0.01;
  this.bias[bestj]-=1.0;
  return bestbiasj;
}
_updateSingle(alpha,i,r,g,b){
  const n=this.network[i];
  n[0]+=alpha*(r-n[0]);
  n[1]+=alpha*(g-n[1]);
  n[2]+=alpha*(b-n[2]);
}
_updateNeighbors(rad,i,r,g,b){
  const lo=Math.max(0,i-rad);
  const hi=Math.min(this.netsize-1,i+rad);
  for(let j=lo;j<=hi;j++){
    if(j===i)continue;
    const dist=Math.abs(j-i);
    const influence=1.0-(dist/(rad+1.0));
    const n=this.network[j];
    n[0]+=influence*0.3*(r-n[0]);
    n[1]+=influence*0.3*(g-n[1]);
    n[2]+=influence*0.3*(b-n[2]);
  }
}
_buildIndex(){
  // Sort by green channel for fast lookup
  const sorted=this.colormap.map((c,i)=>({c,i})).sort((a,b)=>a.c[1]-b.c[1]);
  this._sorted=sorted;
  // Build index by green value
  this.netindex.fill(0);
  let prev=0;
  for(let i=0;i<this.netsize;i++){
    const g=sorted[i].c[1];
    while(prev<=g&&prev<256){this.netindex[prev]=i;prev++}
  }
  while(prev<256){this.netindex[prev]=this.netsize-1;prev++}
}
lookup(r,g,b){
  let bestd=Infinity,best=0;
  // Start from index position
  let start=this.netindex[Math.max(0,Math.min(255,g))];
  // Search forward and backward
  for(let i=start;i<this.netsize;i++){
    const s=this._sorted[i];
    const dg=s.c[1]-g;
    if(dg>bestd)break;
    const d=Math.abs(s.c[0]-r)+Math.abs(dg)+Math.abs(s.c[2]-b);
    if(d<bestd){bestd=d;best=s.i}
  }
  for(let i=start-1;i>=0;i--){
    const s=this._sorted[i];
    const dg=g-s.c[1];
    if(dg>bestd)break;
    const d=Math.abs(s.c[0]-r)+Math.abs(dg)+Math.abs(s.c[2]-b);
    if(d<bestd){bestd=d;best=s.i}
  }
  return best;
}
getColorMapRGB(){
  /* Returns flat array [r,g,b,r,g,b,...] for 256 colors */
  const out=[];
  for(let i=0;i<this.netsize;i++){
    out.push(this.colormap[i][0],this.colormap[i][1],this.colormap[i][2]);
  }
  return out;
}
}

class GIFEncoder{
constructor(w,h){this.width=w;this.height=h;this.frames=[];this.delay=100;this.repeat=0;this.quality=10}
setDelay(d){this.delay=d}setRepeat(r){this.repeat=r}setQuality(q){this.quality=Math.max(1,Math.min(30,q))}
addFrame(ctx){const imgData=ctx.getImageData(0,0,this.width,this.height);this.frames.push({data:imgData.data,delay:this.delay})}
finish(){
const out=[];
/* GIF Header */
[0x47,0x49,0x46,0x38,0x39,0x61].forEach(b=>out.push(b));
this.writeShort(out,this.width);this.writeShort(out,this.height);
out.push(0xF7,0,0); /* GCT flag, 256 colors */

/* 用第一帧建全局调色板 - 输入 RGB 顺序 */
const rgbPx=this.toRGB(this.frames[0].data);
const nq=new NeuQuant(rgbPx,this.quality);
nq.buildColorMap();
const colorMap=nq.getColorMapRGB();
for(let i=0;i<256;i++)out.push(colorMap[i*3],colorMap[i*3+1],colorMap[i*3+2]);

/* Netscape extension for looping */
out.push(0x21,0xFF,0x0B);
'NETSCAPE2.0'.split('').forEach(c=>out.push(c.charCodeAt(0)));
out.push(3,1);this.writeShort(out,this.repeat);out.push(0);

/* Frames */
for(let f=0;f<this.frames.length;f++){
const frame=this.frames[f];
out.push(0x21,0xF9,4,0);
this.writeShort(out,Math.round(frame.delay/10));
out.push(0,0);
out.push(0x2C);
this.writeShort(out,0);this.writeShort(out,0);
this.writeShort(out,this.width);this.writeShort(out,this.height);
out.push(0);
/* Map pixels to palette indices - RGBA input, lookup with RGB */
const indexed=this.indexPixels(frame.data,nq);
this.writeLZW(out,indexed)}
out.push(0x3B);
return new Uint8Array(out)}

toRGB(data){
/* RGBA → RGB flat array */
const count=this.width*this.height;
const rgb=new Uint8Array(count*3);
for(let i=0,j=0;i<data.length;i+=4,j+=3){
  rgb[j]=data[i];rgb[j+1]=data[i+1];rgb[j+2]=data[i+2];
}
return rgb}

indexPixels(data,nq){
const count=this.width*this.height;
const indexed=new Uint8Array(count);
for(let i=0;i<count;i++){
  const off=i*4;
  indexed[i]=nq.lookup(data[off],data[off+1],data[off+2]);
}
return indexed}
return indexed}
writeShort(o,v){o.push(v&0xFF,(v>>8)&0xFF)}
writeLZW(o,indexed){
const minCode=8;o.push(minCode);
const clear=1<<minCode;const eoi=clear+1;
let nextCode=eoi+1;let codeSize=minCode+1;
let table=new Map();for(let i=0;i<clear;i++)table.set(String(i),i);
let buffer=0,bits=0;const subBlock=[];
const emit=(code)=>{buffer|=(code<<bits);bits+=codeSize;while(bits>=8){subBlock.push(buffer&0xFF);buffer>>=8;bits-=8}};
emit(clear);let prev=String(indexed[0]);
for(let i=1;i<indexed.length;i++){
const curr=String(indexed[i]);const key=prev+','+curr;
if(table.has(key)){prev=key}
else{emit(table.get(prev));
if(nextCode<4096){table.set(key,nextCode);if(nextCode>=(1<<codeSize)&&codeSize<12)codeSize++;nextCode++}
else{emit(clear);table=new Map();for(let j=0;j<clear;j++)table.set(String(j),j);nextCode=eoi+1;codeSize=minCode+1}
prev=curr}}
emit(table.get(prev));emit(eoi);
if(bits>0)subBlock.push(buffer&0xFF);
let pos=0;while(pos<subBlock.length){const chunk=Math.min(255,subBlock.length-pos);o.push(chunk);for(let i=0;i<chunk;i++)o.push(subBlock[pos++])}
o.push(0)}
}

/* ============ 主逻辑 ============ */
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const fileNameEl=document.getElementById('fileName');
const videoPreview=document.getElementById('videoPreview');
const srcVideo=document.getElementById('srcVideo');
const convertBtn=document.getElementById('convertBtn');
const progressWrap=document.getElementById('progressWrap');
const bar=document.getElementById('bar');
const status=document.getElementById('status');
const resultEl=document.getElementById('result');
const gifOut=document.getElementById('gifOut');
const gifInfo=document.getElementById('gifInfo');
const dlBtn=document.getElementById('dlBtn');
const dlLottie=document.getElementById('dlLottie');

let selectedFile=null;
let lottieFrames=[]; /* 存储每帧 base64 用于 Lottie */
let lottieW=0,lottieH=0,lottieFps=10;

dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',()=>{if(fileInput.files.length)handleFile(fileInput.files[0])});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>e.preventDefault());
dropZone.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();dropZone.classList.remove('dragover');if(e.dataTransfer.files&&e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});

function handleFile(file){
  if(!file.type.startsWith('video/')){alert('请选择视频文件');return}
  selectedFile=file;
  fileNameEl.textContent='已选择: '+file.name;
  srcVideo.src=URL.createObjectURL(file);
  videoPreview.classList.add('active');
  convertBtn.disabled=false;
  resultEl.classList.remove('active');
}

function seekTo(video,time){
  return new Promise(resolve=>{
    const onSeeked=()=>{
      video.removeEventListener('seeked',onSeeked);
      // 等一帧确保画面已解码
      requestAnimationFrame(()=>requestAnimationFrame(resolve));
    };
    video.addEventListener('seeked',onSeeked);
    video.currentTime=time;
  });
}

convertBtn.addEventListener('click',async()=>{
  if(!selectedFile)return;
  convertBtn.disabled=true;
  progressWrap.classList.add('active');
  resultEl.classList.remove('active');
  bar.style.width='0%';
  status.textContent='准备中…';

  try{
    const video=document.createElement('video');
    video.muted=true;
    video.playsInline=true;
    video.preload='auto';

    const fileURL=URL.createObjectURL(selectedFile);
    video.src=fileURL;

    await new Promise((resolve,reject)=>{
      video.onloadedmetadata=resolve;
      video.onerror=()=>reject(new Error('视频加载失败'));
    });

    const userFps=parseInt(document.getElementById('optFps').value)||10;
    const startTime=parseFloat(document.getElementById('optStart').value)||0;
    const durInput=parseFloat(document.getElementById('optDur').value)||0;
    const maxBytes=(parseFloat(document.getElementById('optMaxMB').value)||5)*1024*1024;
    const userWidth=parseInt(document.getElementById('optWidth').value)||320;
    const ratio=video.videoHeight/video.videoWidth;
    const endTime=durInput>0?Math.min(startTime+durInput,video.duration):video.duration;

    /* 提取所有帧（用最大宽度，最高帧率） */
    const maxW=Math.floor(userWidth);
    const maxH=Math.floor(maxW*ratio);
    if(maxW<=0||maxH<=0)throw new Error('视频尺寸异常');

    const canvas=document.createElement('canvas');
    canvas.width=maxW;canvas.height=maxH;
    const ctx=canvas.getContext('2d');

    const interval=1/userFps;
    const allFrames=[];
    const frameBase64=[]; /* 用于 Lottie */
    let t=Math.max(startTime,0.05);
    const totalEst=Math.floor((endTime-t)/interval);
    status.textContent=`提取帧中… 0/${totalEst}`;

    while(t<endTime){
      await seekTo(video,t);
      ctx.drawImage(video,0,0,maxW,maxH);
      allFrames.push(ctx.getImageData(0,0,maxW,maxH));
      frameBase64.push(canvas.toDataURL('image/png'));
      const pct=Math.round(allFrames.length/Math.max(totalEst,1)*50);
      bar.style.width=pct+'%';
      status.textContent=`提取帧中… ${allFrames.length}/${totalEst}`;
      t+=interval;
    }
    URL.revokeObjectURL(fileURL);

    /* 智能编码：优先保画质，逐步调整参数直到满足大小 */
    /* 策略顺序：1.保持原参数 → 2.降帧率(隔帧) → 3.缩小尺寸 */
    const attempts=[
      {skip:1, scale:1.0},
      {skip:2, scale:1.0},
      {skip:3, scale:1.0},
      {skip:2, scale:0.75},
      {skip:3, scale:0.75},
      {skip:3, scale:0.5},
      {skip:4, scale:0.5},
    ];

    let finalBlob=null;
    let usedW=maxW, usedH=maxH, usedFrameCount=0, usedFps=userFps;

    for(let ai=0;ai<attempts.length;ai++){
      const {skip,scale}=attempts[ai];
      const w=Math.floor(maxW*scale);
      const h=Math.floor(maxH*scale);
      const fps=Math.max(Math.round(userFps/skip),1);

      status.textContent=`尝试编码: ${w}×${h} ${fps}fps (第${ai+1}轮)…`;
      bar.style.width=(55+ai*5)+'%';

      /* 选帧 + 缩放 */
      const encCanvas=document.createElement('canvas');
      encCanvas.width=w;encCanvas.height=h;
      const encCtx=encCanvas.getContext('2d');

      const encoder=new GIFEncoder(w,h);
      encoder.setDelay(Math.round(1000/fps));
      encoder.setRepeat(0);
      encoder.setQuality(1); /* 最高色彩质量 */

      let frameCount=0;
      for(let i=0;i<allFrames.length;i+=skip){
        /* 把原始帧画到缩放后的 canvas */
        const tmpCanvas=document.createElement('canvas');
        tmpCanvas.width=maxW;tmpCanvas.height=maxH;
        tmpCanvas.getContext('2d').putImageData(allFrames[i],0,0);
        encCtx.drawImage(tmpCanvas,0,0,w,h);
        encoder.addFrame(encCtx);
        frameCount++;
      }

      const gifData=encoder.finish();
      const blob=new Blob([gifData],{type:'image/gif'});

      if(blob.size<=maxBytes||ai===attempts.length-1){
        finalBlob=blob;
        usedW=w;usedH=h;usedFrameCount=frameCount;usedFps=fps;
        break;
      }
    }

    const sizeMB=(finalBlob.size/1024/1024).toFixed(2);
    const url=URL.createObjectURL(finalBlob);
    gifOut.src=url;
    dlBtn.href=url;
    gifInfo.textContent=`大小: ${sizeMB} MB | ${usedW}×${usedH} | ${usedFrameCount} 帧 | ${usedFps} fps`;

    if(finalBlob.size>maxBytes){
      gifInfo.textContent+=` ⚠️ 仍超出限制，建议缩短时长`;
    }

    resultEl.classList.add('active');
    bar.style.width='100%';
    status.textContent='转换完成 ✓';

    /* 保存 Lottie 所需数据 */
    lottieFrames=frameBase64;
    lottieW=maxW;lottieH=maxH;lottieFps=usedFps;
  }catch(err){
    console.error(err);
    status.textContent='转换失败: '+err.message;
  }finally{
    convertBtn.disabled=false;
  }
});

/* ============ Lottie JSON 生成 ============ */
function buildLottieJSON(frames,w,h,fps){
  const totalFrames=frames.length;
  /* 构建 assets：每帧一张图 */
  const assets=frames.map((b64,i)=>({
    id:'img_'+i,
    w:w,h:h,
    u:'',
    p:b64,
    e:1 /* embedded */
  }));

  /* 构建序列帧图层 */
  const layer={
    ddd:0,
    ind:1,
    ty:2, /* image layer */
    nm:'frames',
    refId:assets[0].id,
    sr:1,
    ks:{
      o:{a:0,k:100},
      r:{a:0,k:0},
      p:{a:0,k:[w/2,h/2,0]},
      a:{a:0,k:[w/2,h/2,0]},
      s:{a:0,k:[100,100,100]}
    },
    ao:0,
    ip:0,
    op:totalFrames,
    st:0,
    bm:0
  };

  /* 用 time remap 实现序列帧播放 */
  /* 每帧在对应时间点显示对应图片 */
  /* Lottie 不直接支持序列帧切换，用多个图层+时间控制 */
  const layers=frames.map((b64,i)=>({
    ddd:0,
    ind:i+1,
    ty:2,
    nm:'frame_'+i,
    refId:'img_'+i,
    sr:1,
    ks:{
      o:{a:0,k:100},
      r:{a:0,k:0},
      p:{a:0,k:[w/2,h/2,0]},
      a:{a:0,k:[w/2,h/2,0]},
      s:{a:0,k:[100,100,100]}
    },
    ao:0,
    ip:i,
    op:i+1,
    st:0,
    bm:0
  }));

  return {
    v:'5.7.4',
    fr:fps,
    ip:0,
    op:totalFrames,
    w:w,
    h:h,
    nm:'video-to-lottie',
    ddd:0,
    assets:assets,
    layers:layers
  };
}

dlLottie.addEventListener('click',e=>{
  e.preventDefault();
  if(!lottieFrames.length){alert('请先转换视频');return}
  status.textContent='生成 Lottie JSON + 预览 HTML 中…';
  setTimeout(()=>{
    const json=buildLottieJSON(lottieFrames,lottieW,lottieH,lottieFps);
    const str=JSON.stringify(json);

    /* 下载 JSON */
    const jsonBlob=new Blob([str],{type:'application/json'});
    const jsonUrl=URL.createObjectURL(jsonBlob);
    const a1=document.createElement('a');
    a1.href=jsonUrl;a1.download='output-lottie.json';
    a1.click();
    URL.revokeObjectURL(jsonUrl);

    /* 生成预览 HTML 并下载 */
    const previewHTML=`<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

</style>
</head>
<body>

document.getElementById('info').textContent=animData.w+'×'+animData.h+' | '+animData.fr+' fps | '+animData.op+' 帧';
<\\/script>

    const htmlBlob=new Blob([previewHTML.replace(/<\\\/script>/g,'<\/script>')],{type:'text/html'});
    const htmlUrl=URL.createObjectURL(htmlBlob);
    const a2=document.createElement('a');
    a2.href=htmlUrl;a2.download='lottie-preview.html';
    setTimeout(()=>{a2.click();URL.revokeObjectURL(htmlUrl)},300);

    const sizeMB=(jsonBlob.size/1024/1024).toFixed(2);
    status.textContent=`Lottie JSON (${sizeMB} MB) + 预览 HTML 已下载`;
  },50);
});
