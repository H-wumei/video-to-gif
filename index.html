<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频转 GIF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a; color: #e0e0e0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { width: 100%; max-width: 640px; padding: 24px; }
    h1 {
      text-align: center; font-size: 1.6rem; margin-bottom: 24px;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .drop-zone {
      border: 2px dashed #3b82f6; border-radius: 16px;
      padding: 48px 24px; text-align: center; cursor: pointer; transition: background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: rgba(59,130,246,.1); }
    .drop-zone p { font-size: .95rem; color: #94a3b8; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .file-name { font-size: .8rem; color: #6ee7b7; margin-top: 8px; text-align: center; }
    .video-preview { margin-top: 12px; display: none; text-align: center; }
    .video-preview.active { display: block; }
    .video-preview video {
      max-width: 100%; max-height: 240px; border-radius: 12px; border: 1px solid #334155;
    }
    .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .settings label { display: flex; flex-direction: column; gap: 4px; font-size: .85rem; color: #94a3b8; }
    .settings input {
      padding: 8px 10px; border-radius: 8px; border: 1px solid #334155;
      background: #1e1e2e; color: #e0e0e0; font-size: .9rem;
    }
    .full-row { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      margin-top: 16px; width: 100%; padding: 12px; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6); color: #0f0f1a;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .progress-wrap { margin-top: 16px; display: none; }
    .progress-wrap.active { display: block; }
    .progress-bar { height: 6px; border-radius: 3px; background: #1e1e2e; overflow: hidden; }
    .progress-bar .fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6ee7b7, #3b82f6); transition: width .3s;
    }
    .status { text-align: center; font-size: .8rem; color: #94a3b8; margin-top: 6px; }
    .result { margin-top: 20px; text-align: center; display: none; }
    .result.active { display: block; }
    .result img { max-width: 100%; border-radius: 12px; border: 1px solid #334155; }
    .result .info { font-size: .8rem; color: #94a3b8; margin-top: 8px; }
    .result .dl {
      display: inline-block; margin-top: 12px; padding: 10px 28px;
      border-radius: 10px; background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #0f0f1a; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎬 视频转 GIF</h1>
  <input type="file" id="fileInput" accept="video/*,.mov,.avi,.mkv,.webm,.flv" hidden>
  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>拖拽视频文件到这里，或点击选择</p>
  </div>
  <div class="file-name" id="fileName"></div>
  <div class="video-preview" id="videoPreview">
    <video id="srcVideo" controls muted playsinline></video>
  </div>
  <div class="settings">
    <label>宽度 (px)<input type="number" id="optWidth" value="480" min="50" max="1920"></label>
    <label>帧率 (fps)<input type="number" id="optFps" value="15" min="1" max="30"></label>
    <div class="full-row">
      <label>开始时间 (秒)<input type="number" id="optStart" value="0" min="0" step="0.1"></label>
      <label>持续时长 (秒，0=全部)<input type="number" id="optDur" value="0" min="0" step="0.1"></label>
    </div>
    <div class="full-row">
      <label>目标大小上限 (MB)<input type="number" id="optMaxMB" value="5" min="1" max="50" step="0.5"></label>
      <label>颜色采样 (越大越准)<input type="number" id="optSample" value="50000" min="1000" max="200000" step="1000"></label>
    </div>
    <div class="full-row">
      <label>抖动 (减少色带)
        <select id="optDither" style="padding:8px 10px;border-radius:8px;border:1px solid #334155;background:#1e1e2e;color:#e0e0e0;font-size:.9rem;">
          <option value="1" selected>开启 (推荐)</option>
          <option value="0">关闭</option>
        </select>
      </label>
    </div>
  </div>
  <button class="btn" id="convertBtn" disabled>开始转换</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="fill" id="bar"></div></div>
    <p class="status" id="status">准备中…</p>
  </div>
  <div class="result" id="result">
    <img id="gifOut" alt="GIF">
    <div class="info" id="gifInfo"></div>
    <a class="dl" id="dlBtn" download="output.gif">下载 GIF</a>
    <a class="dl" id="dlLottie" download="output.json" style="margin-left:8px;background:linear-gradient(135deg,#a78bfa,#6366f1);">下载 Lottie JSON</a>
  </div>
</div>

<script>
/* ========== 颜色量化：Median Cut 算法（简洁可靠版） ========== */
function quantize(frames, maxColors, sampleCount) {
  var pixels = [];
  var isArray = Array.isArray(frames);
  var frameList = isArray ? frames : [frames];
  var totalPixels = 0;
  for (var f = 0; f < frameList.length; f++) {
    totalPixels += frameList[f].data.length / 4;
  }
  /* 限制最大采样数，避免卡死 */
  var maxSample = Math.min(sampleCount || 50000, 60000);
  var step = Math.max(1, Math.floor(totalPixels / maxSample));
  var count = 0;
  for (var f = 0; f < frameList.length; f++) {
    var data = frameList[f].data;
    for (var i = 0; i < data.length; i += 4) {
      if (count % step === 0 && pixels.length < maxSample) {
        pixels.push([data[i], data[i+1], data[i+2]]);
      }
      count++;
    }
  }

  function getRange(pxs, ch) {
    var mn = 255, mx = 0;
    for (var i = 0; i < pxs.length; i++) {
      if (pxs[i][ch] < mn) mn = pxs[i][ch];
      if (pxs[i][ch] > mx) mx = pxs[i][ch];
    }
    return mx - mn;
  }

  function avgColor(pxs) {
    var r = 0, g = 0, b = 0;
    for (var i = 0; i < pxs.length; i++) {
      r += pxs[i][0]; g += pxs[i][1]; b += pxs[i][2];
    }
    var n = pxs.length;
    return [Math.round(r/n), Math.round(g/n), Math.round(b/n)];
  }

  var buckets = [pixels];
  while (buckets.length < maxColors) {
    /* 找最大的 bucket 来分割 */
    var bestIdx = 0, bestSize = 0;
    for (var i = 0; i < buckets.length; i++) {
      if (buckets[i].length > bestSize) { bestSize = buckets[i].length; bestIdx = i; }
    }
    if (bestSize <= 1) break;
    var bk = buckets[bestIdx];
    /* 找范围最大的通道 */
    var rr = getRange(bk, 0), rg = getRange(bk, 1), rb = getRange(bk, 2);
    var ch = rg >= rr && rg >= rb ? 1 : (rr >= rb ? 0 : 2);
    bk.sort(function(a, b) { return a[ch] - b[ch]; });
    var mid = Math.floor(bk.length / 2);
    buckets.splice(bestIdx, 1, bk.slice(0, mid), bk.slice(mid));
  }

  var palette = [];
  for (var i = 0; i < buckets.length; i++) {
    palette.push(avgColor(buckets[i]));
  }
  /* 补齐到 256 色 */
  while (palette.length < 256) palette.push([0, 0, 0]);
  return palette;
}

/* 查找最近颜色索引 */
function findClosest(palette, r, g, b) {
  var best = 0, bestD = Infinity;
  for (var i = 0; i < palette.length; i++) {
    var dr = r - palette[i][0], dg = g - palette[i][1], db = b - palette[i][2];
    var d = dr*dr + dg*dg + db*db;
    if (d < bestD) { bestD = d; best = i; if (d === 0) break; }
  }
  return best;
}

/* ========== GIF 编码器 ========== */
function encodeGIF(frames, width, height, palette, delays, useDither) {
  var out = [];

  /* Header */
  out.push(0x47,0x49,0x46,0x38,0x39,0x61);
  pushShort(out, width);
  pushShort(out, height);
  out.push(0xF7, 0, 0); /* GCT: 256 colors */

  /* Global Color Table */
  for (var i = 0; i < 256; i++) {
    out.push(palette[i][0], palette[i][1], palette[i][2]);
  }

  /* Netscape looping extension */
  out.push(0x21, 0xFF, 0x0B);
  var ns = 'NETSCAPE2.0';
  for (var i = 0; i < ns.length; i++) out.push(ns.charCodeAt(i));
  out.push(3, 1);
  pushShort(out, 0);
  out.push(0);

  /* Each frame */
  for (var f = 0; f < frames.length; f++) {
    /* Graphic Control Extension - disposal method: restore to background */
    out.push(0x21, 0xF9, 4, 8);
    pushShort(out, Math.round(delays[f] / 10));
    out.push(0, 0);

    /* Image Descriptor */
    out.push(0x2C);
    pushShort(out, 0); pushShort(out, 0);
    pushShort(out, width); pushShort(out, height);
    out.push(0); /* no local color table */

    /* Map pixels to palette indices with optional dithering */
    var imgData = frames[f].data;
    var indexed;
    if (useDither) {
      indexed = ditherFrame(imgData, width, height, palette);
    } else {
      indexed = new Uint8Array(width * height);
      for (var p = 0; p < indexed.length; p++) {
        var off = p * 4;
        indexed[p] = findClosest(palette, imgData[off], imgData[off+1], imgData[off+2]);
      }
    }

    /* LZW compress */
    writeLZW(out, indexed);
  }

  out.push(0x3B); /* Trailer */
  return new Uint8Array(out);
}

/* Floyd-Steinberg 抖动 */
function ditherFrame(imgData, width, height, palette) {
  /* 复制像素数据为浮点数组 */
  var pixels = new Float32Array(width * height * 3);
  for (var i = 0; i < width * height; i++) {
    pixels[i*3]   = imgData[i*4];
    pixels[i*3+1] = imgData[i*4+1];
    pixels[i*3+2] = imgData[i*4+2];
  }
  var indexed = new Uint8Array(width * height);

  for (var y = 0; y < height; y++) {
    for (var x = 0; x < width; x++) {
      var idx = y * width + x;
      var r = Math.max(0, Math.min(255, Math.round(pixels[idx*3])));
      var g = Math.max(0, Math.min(255, Math.round(pixels[idx*3+1])));
      var b = Math.max(0, Math.min(255, Math.round(pixels[idx*3+2])));

      var ci = findClosest(palette, r, g, b);
      indexed[idx] = ci;

      var er = r - palette[ci][0];
      var eg = g - palette[ci][1];
      var eb = b - palette[ci][2];

      /* 扩散误差到相邻像素 */
      if (x + 1 < width) {
        var n = idx + 1;
        pixels[n*3]   += er * 7/16;
        pixels[n*3+1] += eg * 7/16;
        pixels[n*3+2] += eb * 7/16;
      }
      if (y + 1 < height) {
        if (x > 0) {
          var n = idx + width - 1;
          pixels[n*3]   += er * 3/16;
          pixels[n*3+1] += eg * 3/16;
          pixels[n*3+2] += eb * 3/16;
        }
        var n = idx + width;
        pixels[n*3]   += er * 5/16;
        pixels[n*3+1] += eg * 5/16;
        pixels[n*3+2] += eb * 5/16;
        if (x + 1 < width) {
          var n = idx + width + 1;
          pixels[n*3]   += er * 1/16;
          pixels[n*3+1] += eg * 1/16;
          pixels[n*3+2] += eb * 1/16;
        }
      }
    }
  }
  return indexed;
}

function pushShort(o, v) { o.push(v & 0xFF, (v >> 8) & 0xFF); }

function writeLZW(o, indexed) {
  var minCode = 8;
  o.push(minCode);
  var clear = 1 << minCode;
  var eoi = clear + 1;
  var nextCode = eoi + 1;
  var codeSize = minCode + 1;
  var table = new Map();
  for (var i = 0; i < clear; i++) table.set(String(i), i);
  var buffer = 0, bits = 0;
  var subBlock = [];

  function emit(code) {
    buffer |= (code << bits);
    bits += codeSize;
    while (bits >= 8) { subBlock.push(buffer & 0xFF); buffer >>= 8; bits -= 8; }
  }

  emit(clear);
  var prev = String(indexed[0]);
  for (var i = 1; i < indexed.length; i++) {
    var curr = String(indexed[i]);
    var key = prev + ',' + curr;
    if (table.has(key)) { prev = key; }
    else {
      emit(table.get(prev));
      if (nextCode < 4096) {
        table.set(key, nextCode);
        if (nextCode >= (1 << codeSize) && codeSize < 12) codeSize++;
        nextCode++;
      } else {
        emit(clear);
        table = new Map();
        for (var j = 0; j < clear; j++) table.set(String(j), j);
        nextCode = eoi + 1;
        codeSize = minCode + 1;
      }
      prev = curr;
    }
  }
  emit(table.get(prev));
  emit(eoi);
  if (bits > 0) subBlock.push(buffer & 0xFF);

  var pos = 0;
  while (pos < subBlock.length) {
    var chunk = Math.min(255, subBlock.length - pos);
    o.push(chunk);
    for (var k = 0; k < chunk; k++) o.push(subBlock[pos++]);
  }
  o.push(0);
}

/* ========== 主逻辑 ========== */
var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var fileNameEl = document.getElementById('fileName');
var videoPreview = document.getElementById('videoPreview');
var srcVideo = document.getElementById('srcVideo');
var convertBtn = document.getElementById('convertBtn');
var progressWrap = document.getElementById('progressWrap');
var bar = document.getElementById('bar');
var statusEl = document.getElementById('status');
var resultEl = document.getElementById('result');
var gifOut = document.getElementById('gifOut');
var gifInfo = document.getElementById('gifInfo');
var dlBtn = document.getElementById('dlBtn');
var dlLottie = document.getElementById('dlLottie');

var selectedFile = null;
var lottieFrames = [];
var lottieW = 0, lottieH = 0, lottieFps = 10;

dropZone.addEventListener('click', function() { fileInput.click(); });
fileInput.addEventListener('change', function() {
  if (fileInput.files.length) handleFile(fileInput.files[0]);
});
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('drop', function(e) { e.preventDefault(); });
dropZone.addEventListener('dragover', function(e) {
  e.preventDefault(); e.stopPropagation(); dropZone.classList.add('dragover');
});
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) {
  e.preventDefault(); e.stopPropagation(); dropZone.classList.remove('dragover');
  if (e.dataTransfer.files && e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
});

function handleFile(file) {
  /* 放宽检查：允许 video/* 类型，或者常见视频扩展名 */
  var name = file.name.toLowerCase();
  var videoExts = ['.mp4','.mov','.avi','.mkv','.webm','.flv','.wmv','.m4v','.3gp','.ogv'];
  var isVideo = file.type.startsWith('video/') || videoExts.some(function(ext) { return name.endsWith(ext); });
  if (!isVideo) { alert('请选择视频文件'); return; }
  selectedFile = file;
  fileNameEl.textContent = '已选择: ' + file.name;
  srcVideo.src = URL.createObjectURL(file);
  videoPreview.classList.add('active');
  convertBtn.disabled = false;
  resultEl.classList.remove('active');
}

function seekTo(video, time) {
  return new Promise(function(resolve) {
    function onSeeked() {
      video.removeEventListener('seeked', onSeeked);
      /* 等待足够时间确保帧完全解码渲染 */
      setTimeout(function() {
        requestAnimationFrame(function() {
          requestAnimationFrame(resolve);
        });
      }, 50);
    }
    video.addEventListener('seeked', onSeeked);
    video.currentTime = time;
  });
}

convertBtn.addEventListener('click', async function() {
  if (!selectedFile) return;
  convertBtn.disabled = true;
  progressWrap.classList.add('active');
  resultEl.classList.remove('active');
  bar.style.width = '0%';
  statusEl.textContent = '准备中…';

  try {
    var video = document.createElement('video');
    video.muted = true; video.playsInline = true; video.preload = 'auto';
    var fileURL = URL.createObjectURL(selectedFile);
    video.src = fileURL;

    await new Promise(function(resolve, reject) {
      video.onloadedmetadata = function() {
        /* 等视频可以播放再继续 */
        if (video.readyState >= 2) { resolve(); return; }
        video.oncanplay = resolve;
      };
      video.onerror = function() { reject(new Error('视频加载失败，该格式可能不被浏览器支持')); };
    });

    var userFps = parseInt(document.getElementById('optFps').value) || 10;
    var startTime = parseFloat(document.getElementById('optStart').value) || 0;
    var durInput = parseFloat(document.getElementById('optDur').value) || 0;
    var maxBytes = (parseFloat(document.getElementById('optMaxMB').value) || 5) * 1024 * 1024;
    var userWidth = parseInt(document.getElementById('optWidth').value) || 320;
    var sampleCount = parseInt(document.getElementById('optSample').value) || 20000;
    var useDither = document.getElementById('optDither').value === '1';
    var ratio = video.videoHeight / video.videoWidth;
    var endTime = durInput > 0 ? Math.min(startTime + durInput, video.duration) : video.duration;

    var maxW = Math.floor(userWidth);
    var maxH = Math.floor(maxW * ratio);
    if (maxW <= 0 || maxH <= 0) throw new Error('视频尺寸异常');

    var canvas = document.createElement('canvas');
    canvas.width = maxW; canvas.height = maxH;
    var ctx = canvas.getContext('2d');

    var interval = 1 / userFps;
    var allFrames = [];
    var frameBase64 = [];
    var t = Math.max(startTime, 0.05);
    var totalEst = Math.floor((endTime - t) / interval);
    statusEl.textContent = '提取帧中… 0/' + totalEst;

    while (t < endTime) {
      await seekTo(video, t);
      ctx.clearRect(0, 0, maxW, maxH);
      ctx.drawImage(video, 0, 0, maxW, maxH);
      allFrames.push(ctx.getImageData(0, 0, maxW, maxH));
      frameBase64.push(canvas.toDataURL('image/png'));
      var pct = Math.round(allFrames.length / Math.max(totalEst, 1) * 50);
      bar.style.width = pct + '%';
      statusEl.textContent = '提取帧中… ' + allFrames.length + '/' + totalEst;
      t += interval;
    }
    URL.revokeObjectURL(fileURL);

    /* 用所有帧建调色板，颜色更准确 */
    statusEl.textContent = '生成调色板中…';
    bar.style.width = '52%';
    /* 用 setTimeout 让 UI 有机会更新 */
    await new Promise(function(r) { setTimeout(r, 50); });
    var palette = quantize(allFrames, 256, sampleCount);

    /* 智能编码 */
    var attempts = [
      {skip:1, scale:1.0}, {skip:2, scale:1.0}, {skip:3, scale:1.0},
      {skip:2, scale:0.75}, {skip:3, scale:0.75},
      {skip:3, scale:0.5}, {skip:4, scale:0.5}
    ];

    var finalBlob = null;
    var usedW = maxW, usedH = maxH, usedFrameCount = 0, usedFps = userFps;

    for (var ai = 0; ai < attempts.length; ai++) {
      var skip = attempts[ai].skip, scale = attempts[ai].scale;
      var w = Math.floor(maxW * scale), h = Math.floor(maxH * scale);
      var fps = Math.max(Math.round(userFps / skip), 1);
      var delay = Math.round(1000 / fps);

      statusEl.textContent = '编码: ' + w + '×' + h + ' ' + fps + 'fps (第' + (ai+1) + '轮)…';
      bar.style.width = (55 + ai * 5) + '%';
      await new Promise(function(r) { setTimeout(r, 30); });

      var encCanvas = document.createElement('canvas');
      encCanvas.width = w; encCanvas.height = h;
      var encCtx = encCanvas.getContext('2d');

      var selectedFrames = [];
      var delays = [];
      for (var i = 0; i < allFrames.length; i += skip) {
        var tmp = document.createElement('canvas');
        tmp.width = maxW; tmp.height = maxH;
        tmp.getContext('2d').putImageData(allFrames[i], 0, 0);
        encCtx.drawImage(tmp, 0, 0, w, h);
        selectedFrames.push(encCtx.getImageData(0, 0, w, h));
        delays.push(delay);
      }

      /* 如果缩放了，重新建调色板 */
      var pal = (scale < 1) ? quantize(selectedFrames, 256, sampleCount) : palette;
      var gifData = encodeGIF(selectedFrames, w, h, pal, delays, useDither);
      var blob = new Blob([gifData], {type: 'image/gif'});

      if (blob.size <= maxBytes || ai === attempts.length - 1) {
        finalBlob = blob; usedW = w; usedH = h;
        usedFrameCount = selectedFrames.length; usedFps = fps;
        break;
      }
    }

    var sizeMB = (finalBlob.size / 1024 / 1024).toFixed(2);
    var url = URL.createObjectURL(finalBlob);
    gifOut.src = url;
    dlBtn.href = url;
    gifInfo.textContent = '大小: ' + sizeMB + ' MB | ' + usedW + '×' + usedH + ' | ' + usedFrameCount + ' 帧 | ' + usedFps + ' fps';
    if (finalBlob.size > maxBytes) {
      gifInfo.textContent += ' ⚠️ 仍超出限制，建议缩短时长';
    }
    resultEl.classList.add('active');
    bar.style.width = '100%';
    statusEl.textContent = '转换完成 ✓';

    lottieFrames = frameBase64;
    lottieW = maxW; lottieH = maxH; lottieFps = usedFps;
  } catch(err) {
    console.error(err);
    statusEl.textContent = '转换失败: ' + err.message;
  } finally {
    convertBtn.disabled = false;
  }
});

/* ========== Lottie JSON ========== */
function buildLottieJSON(frames, w, h, fps) {
  var totalFrames = frames.length;
  var assets = frames.map(function(b64, i) {
    return { id: 'img_' + i, w: w, h: h, u: '', p: b64, e: 1 };
  });
  var layers = frames.map(function(b64, i) {
    return {
      ddd: 0, ind: i + 1, ty: 2, nm: 'frame_' + i, refId: 'img_' + i, sr: 1,
      ks: {
        o: {a:0,k:100}, r: {a:0,k:0},
        p: {a:0,k:[w/2,h/2,0]}, a: {a:0,k:[w/2,h/2,0]},
        s: {a:0,k:[100,100,100]}
      },
      ao: 0, ip: i, op: i + 1, st: 0, bm: 0
    };
  });
  return {
    v: '5.7.4', fr: fps, ip: 0, op: totalFrames,
    w: w, h: h, nm: 'video-to-lottie', ddd: 0,
    assets: assets, layers: layers
  };
}

dlLottie.addEventListener('click', function(e) {
  e.preventDefault();
  if (!lottieFrames.length) { alert('请先转换视频'); return; }
  statusEl.textContent = '生成 Lottie JSON + 预览 HTML 中…';
  setTimeout(function() {
    var json = buildLottieJSON(lottieFrames, lottieW, lottieH, lottieFps);
    var str = JSON.stringify(json);

    var jsonBlob = new Blob([str], {type: 'application/json'});
    var jsonUrl = URL.createObjectURL(jsonBlob);
    var a1 = document.createElement('a');
    a1.href = jsonUrl; a1.download = 'output-lottie.json';
    a1.click();
    URL.revokeObjectURL(jsonUrl);

    var previewHTML = '<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Lottie 预览</title><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f0f1a;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:sans-serif;color:#e0e0e0}h1{font-size:1.3rem;margin-bottom:16px;color:#a78bfa}#player{border:1px solid #334155;border-radius:12px;overflow:hidden}.controls{margin-top:12px;display:flex;gap:8px}.controls button{padding:8px 20px;border:none;border-radius:8px;background:#6366f1;color:#fff;cursor:pointer}.info{font-size:.8rem;color:#94a3b8;margin-top:8px}</style></head><body><h1>Lottie 动画预览</h1><div id="player"></div><div class="controls"><button onclick="anim.goToAndPlay(0,true)">重播</button><button onclick="anim.isPaused?anim.play():anim.pause()">播放/暂停</button></div><div class="info" id="info"></div><script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"><\/script><script>var animData=' + str + ';var anim=lottie.loadAnimation({container:document.getElementById("player"),renderer:"svg",loop:true,autoplay:true,animationData:animData});document.getElementById("info").textContent=animData.w+"×"+animData.h+" | "+animData.fr+" fps | "+animData.op+" 帧";<\/script></body></html>';

    var htmlBlob = new Blob([previewHTML], {type: 'text/html'});
    var htmlUrl = URL.createObjectURL(htmlBlob);
    var a2 = document.createElement('a');
    a2.href = htmlUrl; a2.download = 'lottie-preview.html';
    setTimeout(function() { a2.click(); URL.revokeObjectURL(htmlUrl); }, 300);

    var sizeMB = (jsonBlob.size / 1024 / 1024).toFixed(2);
    statusEl.textContent = 'Lottie JSON (' + sizeMB + ' MB) + 预览 HTML 已下载';
  }, 50);
});
</script>
</body>
</html>
