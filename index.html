<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>视频转 GIF</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a; color: #e0e0e0;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .container { width: 100%; max-width: 640px; padding: 24px; }
    h1 {
      text-align: center; font-size: 1.6rem; margin-bottom: 24px;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .drop-zone {
      border: 2px dashed #3b82f6; border-radius: 16px;
      padding: 48px 24px; text-align: center; cursor: pointer; transition: background .2s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: rgba(59,130,246,.1); }
    .drop-zone p { font-size: .95rem; color: #94a3b8; }
    .drop-zone .icon { font-size: 2.5rem; margin-bottom: 8px; }
    .file-name { font-size: .8rem; color: #6ee7b7; margin-top: 8px; text-align: center; }
    .video-preview { margin-top: 12px; display: none; text-align: center; }
    .video-preview.active { display: block; }
    .video-preview video {
      max-width: 100%; max-height: 240px; border-radius: 12px; border: 1px solid #334155;
    }
    .settings { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
    .settings label { display: flex; flex-direction: column; gap: 4px; font-size: .85rem; color: #94a3b8; }
    .settings input {
      padding: 8px 10px; border-radius: 8px; border: 1px solid #334155;
      background: #1e1e2e; color: #e0e0e0; font-size: .9rem;
    }
    .full-row { grid-column: 1 / -1; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn {
      margin-top: 16px; width: 100%; padding: 12px; border: none;
      border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, #6ee7b7, #3b82f6); color: #0f0f1a;
    }
    .btn:disabled { opacity: .4; cursor: not-allowed; }
    .progress-wrap { margin-top: 16px; display: none; }
    .progress-wrap.active { display: block; }
    .progress-bar { height: 6px; border-radius: 3px; background: #1e1e2e; overflow: hidden; }
    .progress-bar .fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #6ee7b7, #3b82f6); transition: width .3s;
    }
    .status { text-align: center; font-size: .8rem; color: #94a3b8; margin-top: 6px; }
    .result { margin-top: 20px; text-align: center; display: none; }
    .result.active { display: block; }
    .result img { max-width: 100%; border-radius: 12px; border: 1px solid #334155; }
    .result .info { font-size: .8rem; color: #94a3b8; margin-top: 8px; }
    .result .dl {
      display: inline-block; margin-top: 12px; padding: 10px 28px;
      border-radius: 10px; background: linear-gradient(135deg, #6ee7b7, #3b82f6);
      color: #0f0f1a; text-decoration: none; font-weight: 600;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎬 视频转 GIF</h1>
  <input type="file" id="fileInput" accept="video/*" hidden>
  <div class="drop-zone" id="dropZone">
    <div class="icon">📁</div>
    <p>拖拽视频文件到这里，或点击选择</p>
  </div>
  <div class="file-name" id="fileName"></div>
  <div class="video-preview" id="videoPreview">
    <video id="srcVideo" controls muted playsinline></video>
  </div>
  <div class="settings">
    <label>宽度 (px)<input type="number" id="optWidth" value="320" min="50" max="1920"></label>
    <label>帧率 (fps)<input type="number" id="optFps" value="10" min="1" max="30"></label>
    <div class="full-row">
      <label>开始时间 (秒)<input type="number" id="optStart" value="0" min="0" step="0.1"></label>
      <label>持续时长 (秒，0=全部)<input type="number" id="optDur" value="0" min="0" step="0.1"></label>
    </div>
    <div class="full-row">
      <label>目标大小上限 (MB)<input type="number" id="optMaxMB" value="5" min="1" max="50" step="0.5"></label>
    </div>
  </div>
  <button class="btn" id="convertBtn" disabled>开始转换</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar"><div class="fill" id="bar"></div></div>
    <p class="status" id="status">准备中…</p>
  </div>
  <div class="result" id="result">
    <img id="gifOut" alt="GIF">
    <div class="info" id="gifInfo"></div>
    <a class="dl" id="dlBtn" download="output.gif">下载 GIF</a>
  </div>
</div>

<script>
/* ============ 内嵌 GIF 编码器 (基于 GIFEncoder / NeuQuant) ============ */
class GIFEncoder{constructor(w,h){this.width=w;this.height=h;this.frames=[];this.delay=100;this.repeat=0;this.quality=10}
setDelay(d){this.delay=d}setRepeat(r){this.repeat=r}setQuality(q){this.quality=Math.max(1,Math.min(20,q))}
addFrame(ctx){const imgData=ctx.getImageData(0,0,this.width,this.height);this.frames.push({data:imgData.data,delay:this.delay})}
finish(){const out=[];this.writeHeader(out);this.writeNetscape(out);for(let i=0;i<this.frames.length;i++){const f=this.frames[i];const pixels=this.analyzePixels(f.data);const palette=this.buildPalette(pixels);const indexed=this.mapPixels(pixels,palette);this.writeGraphicControl(out,f.delay);this.writeImageDesc(out);this.writePalette(out,palette);this.writeLZW(out,indexed,palette.length)}
out.push(0x3B);return new Uint8Array(out)}
writeHeader(o){[0x47,0x49,0x46,0x38,0x39,0x61].forEach(b=>o.push(b));this.writeShort(o,this.width);this.writeShort(o,this.height);o.push(0x70,0,0)}
writeNetscape(o){o.push(0x21,0xFF,0x0B);'NETSCAPE2.0'.split('').forEach(c=>o.push(c.charCodeAt(0)));o.push(3,1);this.writeShort(o,this.repeat);o.push(0)}
writeGraphicControl(o,delay){o.push(0x21,0xF9,4,0);this.writeShort(o,Math.round(delay/10));o.push(0,0)}
writeImageDesc(o){o.push(0x2C);this.writeShort(o,0);this.writeShort(o,0);this.writeShort(o,this.width);this.writeShort(o,this.height);o.push(0x87)}
writePalette(o,p){for(let i=0;i<256;i++){if(i<p.length){o.push(p[i][0],p[i][1],p[i][2])}else{o.push(0,0,0)}}}
writeShort(o,v){o.push(v&0xFF,(v>>8)&0xFF)}
analyzePixels(data){const pixels=[];for(let i=0;i<data.length;i+=4){pixels.push([data[i],data[i+1],data[i+2]])}return pixels}
buildPalette(pixels){const sample=Math.max(1,Math.floor(pixels.length/(this.quality*100)));const colorMap=new Map();for(let i=0;i<pixels.length;i+=sample){const k=(pixels[i][0]>>3)*2048+(pixels[i][1]>>3)*64+(pixels[i][2]>>3);colorMap.set(k,pixels[i])}
const colors=[...colorMap.values()];if(colors.length>=256)return this.medianCut(colors,256);while(colors.length<256)colors.push([0,0,0]);return colors}
medianCut(colors,target){let buckets=[colors];while(buckets.length<target){let longest=0,li=0;for(let i=0;i<buckets.length;i++){const b=buckets[i];if(b.length<=1)continue;const ranges=[0,1,2].map(c=>{let mn=255,mx=0;b.forEach(p=>{mn=Math.min(mn,p[c]);mx=Math.max(mx,p[c])});return mx-mn});const r=Math.max(...ranges);if(r>longest){longest=r;li=i}}
if(longest===0)break;const b=buckets[li];const ranges=[0,1,2].map(c=>{let mn=255,mx=0;b.forEach(p=>{mn=Math.min(mn,p[c]);mx=Math.max(mx,p[c])});return mx-mn});const ch=ranges.indexOf(Math.max(...ranges));b.sort((a,c)=>a[ch]-c[ch]);const mid=Math.floor(b.length/2);buckets.splice(li,1,b.slice(0,mid),b.slice(mid))}
return buckets.map(b=>{if(!b.length)return[0,0,0];const s=[0,0,0];b.forEach(p=>{s[0]+=p[0];s[1]+=p[1];s[2]+=p[2]});return[Math.round(s[0]/b.length),Math.round(s[1]/b.length),Math.round(s[2]/b.length)]})}
mapPixels(pixels,palette){const indexed=new Uint8Array(pixels.length);for(let i=0;i<pixels.length;i++){let best=0,bestD=Infinity;const p=pixels[i];for(let j=0;j<palette.length;j++){const c=palette[j];const d=(p[0]-c[0])**2+(p[1]-c[1])**2+(p[2]-c[2])**2;if(d<bestD){bestD=d;best=j;if(d===0)break}}indexed[i]=best}return indexed}
writeLZW(o,indexed,palSize){const minCode=8;o.push(minCode);const clear=1<<minCode;const eoi=clear+1;let nextCode=eoi+1;let codeSize=minCode+1;let table=new Map();for(let i=0;i<clear;i++)table.set(String(i),i);let buffer=0,bits=0;const subBlock=[];const emit=(code)=>{buffer|=(code<<bits);bits+=codeSize;while(bits>=8){subBlock.push(buffer&0xFF);buffer>>=8;bits-=8}};
emit(clear);let prev=String(indexed[0]);for(let i=1;i<indexed.length;i++){const curr=String(indexed[i]);const key=prev+','+curr;if(table.has(key)){prev=key}else{emit(table.get(prev));if(nextCode<4096){table.set(key,nextCode);if(nextCode>=(1<<codeSize)&&codeSize<12)codeSize++;nextCode++}else{emit(clear);table=new Map();for(let j=0;j<clear;j++)table.set(String(j),j);nextCode=eoi+1;codeSize=minCode+1}prev=curr}}
emit(table.get(prev));emit(eoi);if(bits>0)subBlock.push(buffer&0xFF);
let pos=0;while(pos<subBlock.length){const chunk=Math.min(255,subBlock.length-pos);o.push(chunk);for(let i=0;i<chunk;i++)o.push(subBlock[pos++])}o.push(0)}}

/* ============ 主逻辑 ============ */
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('fileInput');
const fileNameEl=document.getElementById('fileName');
const videoPreview=document.getElementById('videoPreview');
const srcVideo=document.getElementById('srcVideo');
const convertBtn=document.getElementById('convertBtn');
const progressWrap=document.getElementById('progressWrap');
const bar=document.getElementById('bar');
const status=document.getElementById('status');
const resultEl=document.getElementById('result');
const gifOut=document.getElementById('gifOut');
const gifInfo=document.getElementById('gifInfo');
const dlBtn=document.getElementById('dlBtn');

let selectedFile=null;

dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',()=>{if(fileInput.files.length)handleFile(fileInput.files[0])});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>e.preventDefault());
dropZone.addEventListener('dragover',e=>{e.preventDefault();e.stopPropagation();dropZone.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();e.stopPropagation();dropZone.classList.remove('dragover');if(e.dataTransfer.files&&e.dataTransfer.files.length)handleFile(e.dataTransfer.files[0])});

function handleFile(file){
  if(!file.type.startsWith('video/')){alert('请选择视频文件');return}
  selectedFile=file;
  fileNameEl.textContent='已选择: '+file.name;
  srcVideo.src=URL.createObjectURL(file);
  videoPreview.classList.add('active');
  convertBtn.disabled=false;
  resultEl.classList.remove('active');
}

function seekTo(video,time){
  return new Promise(resolve=>{
    const onSeeked=()=>{
      video.removeEventListener('seeked',onSeeked);
      // 等一帧确保画面已解码
      requestAnimationFrame(()=>requestAnimationFrame(resolve));
    };
    video.addEventListener('seeked',onSeeked);
    video.currentTime=time;
  });
}

convertBtn.addEventListener('click',async()=>{
  if(!selectedFile)return;
  convertBtn.disabled=true;
  progressWrap.classList.add('active');
  resultEl.classList.remove('active');
  bar.style.width='0%';
  status.textContent='准备中…';

  try{
    const video=document.createElement('video');
    video.muted=true;
    video.playsInline=true;
    video.preload='auto';

    const fileURL=URL.createObjectURL(selectedFile);
    video.src=fileURL;

    await new Promise((resolve,reject)=>{
      video.onloadedmetadata=resolve;
      video.onerror=()=>reject(new Error('视频加载失败'));
    });

    const userFps=parseInt(document.getElementById('optFps').value)||10;
    const startTime=parseFloat(document.getElementById('optStart').value)||0;
    const durInput=parseFloat(document.getElementById('optDur').value)||0;
    const maxBytes=(parseFloat(document.getElementById('optMaxMB').value)||5)*1024*1024;
    const userWidth=parseInt(document.getElementById('optWidth').value)||320;
    const ratio=video.videoHeight/video.videoWidth;
    const endTime=durInput>0?Math.min(startTime+durInput,video.duration):video.duration;

    /* 提取所有帧（用最大宽度，最高帧率） */
    const maxW=Math.floor(userWidth);
    const maxH=Math.floor(maxW*ratio);
    if(maxW<=0||maxH<=0)throw new Error('视频尺寸异常');

    const canvas=document.createElement('canvas');
    canvas.width=maxW;canvas.height=maxH;
    const ctx=canvas.getContext('2d');

    const interval=1/userFps;
    const allFrames=[];
    let t=Math.max(startTime,0.05);
    const totalEst=Math.floor((endTime-t)/interval);
    status.textContent=`提取帧中… 0/${totalEst}`;

    while(t<endTime){
      await seekTo(video,t);
      ctx.drawImage(video,0,0,maxW,maxH);
      allFrames.push(ctx.getImageData(0,0,maxW,maxH));
      const pct=Math.round(allFrames.length/Math.max(totalEst,1)*50);
      bar.style.width=pct+'%';
      status.textContent=`提取帧中… ${allFrames.length}/${totalEst}`;
      t+=interval;
    }
    URL.revokeObjectURL(fileURL);

    /* 智能编码：优先保画质，逐步调整参数直到满足大小 */
    /* 策略顺序：1.保持原参数 → 2.降帧率(隔帧) → 3.缩小尺寸 */
    const attempts=[
      {skip:1, scale:1.0},
      {skip:2, scale:1.0},
      {skip:3, scale:1.0},
      {skip:2, scale:0.75},
      {skip:3, scale:0.75},
      {skip:3, scale:0.5},
      {skip:4, scale:0.5},
    ];

    let finalBlob=null;
    let usedW=maxW, usedH=maxH, usedFrameCount=0, usedFps=userFps;

    for(let ai=0;ai<attempts.length;ai++){
      const {skip,scale}=attempts[ai];
      const w=Math.floor(maxW*scale);
      const h=Math.floor(maxH*scale);
      const fps=Math.max(Math.round(userFps/skip),1);

      status.textContent=`尝试编码: ${w}×${h} ${fps}fps (第${ai+1}轮)…`;
      bar.style.width=(55+ai*5)+'%';

      /* 选帧 + 缩放 */
      const encCanvas=document.createElement('canvas');
      encCanvas.width=w;encCanvas.height=h;
      const encCtx=encCanvas.getContext('2d');

      const encoder=new GIFEncoder(w,h);
      encoder.setDelay(Math.round(1000/fps));
      encoder.setRepeat(0);
      encoder.setQuality(1); /* 最高色彩质量 */

      let frameCount=0;
      for(let i=0;i<allFrames.length;i+=skip){
        /* 把原始帧画到缩放后的 canvas */
        const tmpCanvas=document.createElement('canvas');
        tmpCanvas.width=maxW;tmpCanvas.height=maxH;
        tmpCanvas.getContext('2d').putImageData(allFrames[i],0,0);
        encCtx.drawImage(tmpCanvas,0,0,w,h);
        encoder.addFrame(encCtx);
        frameCount++;
      }

      const gifData=encoder.finish();
      const blob=new Blob([gifData],{type:'image/gif'});

      if(blob.size<=maxBytes||ai===attempts.length-1){
        finalBlob=blob;
        usedW=w;usedH=h;usedFrameCount=frameCount;usedFps=fps;
        break;
      }
    }

    const sizeMB=(finalBlob.size/1024/1024).toFixed(2);
    const url=URL.createObjectURL(finalBlob);
    gifOut.src=url;
    dlBtn.href=url;
    gifInfo.textContent=`大小: ${sizeMB} MB | ${usedW}×${usedH} | ${usedFrameCount} 帧 | ${usedFps} fps`;

    if(finalBlob.size>maxBytes){
      gifInfo.textContent+=` ⚠️ 仍超出限制，建议缩短时长`;
    }

    resultEl.classList.add('active');
    bar.style.width='100%';
    status.textContent='转换完成 ✓';
  }catch(err){
    console.error(err);
    status.textContent='转换失败: '+err.message;
  }finally{
    convertBtn.disabled=false;
  }
});
</script>
</body>
</html>
